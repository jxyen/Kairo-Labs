<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kairo Labs — Product Renders</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" />
<style>
  body{margin:0;background:#050506;color:#f4f6f5;font-family:"Switzer",Arial,sans-serif;padding:48px 24px 100px;}
  .wrap{max-width:1180px;margin:0 auto;}
  h1{font-size:26px;font-weight:800;letter-spacing:-.02em;text-transform:uppercase;margin:0 0 6px;}
  p{color:#99a1a0;font-size:14px;margin:0 0 32px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
  .card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.09);border-radius:14px;overflow:hidden;}
  .card img{display:block;width:100%;aspect-ratio:1;object-fit:cover;background:#000;}
  .card .nm{padding:12px 14px;font-size:13px;font-weight:600;letter-spacing:.02em;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Kairo Labs · Product Renders</h1>
  <p>Full core line, generated from the locked master (Clean B). All show 10MG on the label; real size options will live in the listing.</p>
  <div class="grid">
    <div class="card"><img src="/products/bpc-157.png"/><div class="nm">BPC-157</div></div>
    <div class="card"><img src="/products/tb-500.png"/><div class="nm">TB-500</div></div>
    <div class="card"><img src="/products/tirzepatide.png"/><div class="nm">Tirzepatide</div></div>
    <div class="card"><img src="/products/retatrutide.png"/><div class="nm">Retatrutide</div></div>
    <div class="card"><img src="/products/cjc-1295.png"/><div class="nm">CJC-1295</div></div>
    <div class="card"><img src="/products/ipamorelin.png"/><div class="nm">Ipamorelin</div></div>
    <div class="card"><img src="/products/ghk-cu.png"/><div class="nm">GHK-Cu</div></div>
    <div class="card"><img src="/products/mt-2.png"/><div class="nm">MT-2</div></div>
    <div class="card"><img src="/products/mots-c.png"/><div class="nm">MOTS-c</div></div>
    <div class="card"><img src="/products/igf-1-lr3.png"/><div class="nm">IGF-1 LR3</div></div>
  </div>
</div>
</body>
</html>
